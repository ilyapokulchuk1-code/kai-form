<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAI CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:#2a2a38;--accent:#ff3c5f;--accent2:#ffb800;--accent3:#00e5a0;--text:#f0f0f8;--muted:#7a7a9a;--tag-bg:#22223a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(–bg);z-index:1000;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(–card);border:1px solid var(–border);border-radius:24px;padding:36px 32px;width:100%;max-width:340px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.6);}
.login-logo{font-family:‘Bebas Neue’,cursive;font-size:44px;color:var(–accent);letter-spacing:3px;margin-bottom:2px;}
.login-logo span{color:var(–text);}
.login-sub{font-size:11px;color:var(–muted);margin-bottom:28px;letter-spacing:1px;text-transform:uppercase;}
.pin-display{display:flex;justify-content:center;gap:14px;margin-bottom:28px;}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(–border);transition:all .15s;}
.pin-dot.filled{background:var(–accent);border-color:var(–accent);transform:scale(1.2);}
.pin-dot.shake{animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin:0 auto 16px;}
.num-btn{background:var(–surface);border:1px solid var(–border);color:var(–text);border-radius:14px;height:58px;font-family:‘DM Sans’,sans-serif;font-size:22px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.num-btn:active{transform:scale(0.91);background:rgba(255,60,95,.12);}
.num-btn.zero{grid-column:2;}
.num-btn.del{font-size:17px;color:var(–muted);}
.login-err{font-size:12px;min-height:40px;margin-top:4px;padding:0 8px;line-height:1.4;}
.login-err.red{color:var(–accent);}
.login-err.yellow{color:var(–accent2);}
.blocked-timer{font-size:13px;color:var(–accent);font-weight:700;margin-top:8px;}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(–bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.ll{font-family:‘Bebas Neue’,cursive;font-size:48px;color:var(–accent);}
.ll span{color:var(–text);}
.lb{width:200px;height:3px;background:var(–border);border-radius:2px;overflow:hidden;}
.lf{height:100%;background:linear-gradient(90deg,var(–accent),var(–accent2));animation:ld 1.5s ease-in-out infinite;}
@keyframes ld{0%{width:0;margin-left:0;}50%{width:100%;}100%{width:0;margin-left:100%;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* HEADER */
header{background:var(–surface);border-bottom:1px solid var(–border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap;}
.logo{font-family:‘Bebas Neue’,cursive;font-size:26px;letter-spacing:2px;color:var(–accent);}
.logo span{color:var(–text);}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.who-badge{display:flex;align-items:center;gap:7px;background:var(–tag-bg);border:1px solid var(–border);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;}
.who-dot{width:8px;height:8px;border-radius:50%;background:var(–accent);}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(–muted);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(–muted);}
.sync-dot.ok{background:var(–accent3);}
.sync-dot.loading{background:var(–accent2);animation:pulse 1s infinite;}
#notif-btn{background:var(–tag-bg);border:1px solid var(–border);border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;transition:all .2s;position:relative;}
.notif-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:var(–accent);display:none;}
.btn-logout{background:transparent;border:1px solid var(–border);color:var(–muted);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:‘DM Sans’,sans-serif;transition:all .2s;}
.btn-logout:hover{border-color:var(–accent);color:var(–accent);}
.btn-header{background:var(–tag-bg);border:1px solid var(–border);color:var(–text);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:‘DM Sans’,sans-serif;transition:all .2s;}
.btn-header:hover{border-color:var(–accent3);color:var(–accent3);}

/* MAIN */
.container{max-width:1500px;margin:0 auto;padding:20px 16px;}
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.stat-card{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:14px;text-align:center;transition:transform .2s;}
.stat-card:hover{transform:translateY(-2px);}
.stat-num{font-family:‘Bebas Neue’,cursive;font-size:34px;color:var(–accent);line-height:1;}
.stat-label{font-size:10px;color:var(–muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.btn-primary{background:var(–accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-primary:hover{background:#ff1a44;}
.filter-btn{background:var(–surface);border:1px solid var(–border);color:var(–muted);border-radius:8px;padding:8px 14px;font-family:‘DM Sans’,sans-serif;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.filter-btn.active{border-color:var(–accent);color:var(–text);background:rgba(255,60,95,0.1);}
.search-box{flex:1;min-width:160px;background:var(–surface);border:1px solid var(–border);color:var(–text);border-radius:8px;padding:8px 14px;font-family:‘DM Sans’,sans-serif;font-size:13px;outline:none;}
.search-box:focus{border-color:var(–accent);}
.search-box::placeholder{color:var(–muted);}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(8,minmax(175px,1fr));gap:12px;overflow-x:auto;padding-bottom:12px;}
.column{background:var(–surface);border:1px solid var(–border);border-radius:14px;min-height:360px;display:flex;flex-direction:column;}
.col-header{padding:12px 12px 8px;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;}
.col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.col-count{background:var(–tag-bg);border-radius:10px;padding:2px 7px;font-size:11px;color:var(–muted);font-weight:600;}
.col-body{padding:8px;display:flex;flex-direction:column;gap:8px;flex:1;}
.proj-card{background:var(–card);border:1px solid var(–border);border-radius:10px;padding:11px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:fadeIn .3s ease;touch-action:none;user-select:none;}
.proj-card::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px;}
.proj-card:hover{border-color:var(–accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,60,95,.12);}
.proj-name{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3;}
.proj-meta{font-size:11px;color:var(–muted);margin-bottom:6px;}
.proj-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.tag{background:var(–tag-bg);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.tag-paid{color:var(–accent3);}.tag-nopay{color:var(–accent);}
.proj-footer{display:flex;align-items:center;justify-content:space-between;margin-top:5px;}
.assignees{display:flex;}
.avatar{width:20px;height:20px;border-radius:50%;border:2px solid var(–card);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;margin-left:-4px;}
.avatar:first-child{margin-left:0;}
.av-0{background:#ff3c5f;color:#fff;}.av-1{background:#ffb800;color:#000;}.av-2{background:#00e5a0;color:#000;}.av-3{background:#7c5cfc;color:#fff;}
.due-date{font-size:10px;color:var(–muted);}
.due-date.overdue{color:var(–accent);font-weight:700;}
.due-date.soon1{color:var(–accent);font-weight:700;}
.due-date.soon2{color:var(–accent2);font-weight:600;}
.due-date.soon3{color:var(–accent3);}

/* DEADLINE BADGE */
.deadline-badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;margin-top:4px;}
.db-green{background:rgba(0,229,160,.15);color:var(–accent3);border:1px solid rgba(0,229,160,.3);}
.db-yellow{background:rgba(255,184,0,.15);color:var(–accent2);border:1px solid rgba(255,184,0,.3);}
.db-red{background:rgba(255,60,95,.15);color:var(–accent);border:1px solid rgba(255,60,95,.3);}
.db-over{background:rgba(255,60,95,.25);color:var(–accent);border:1px solid var(–accent);}

.reels-mini{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;}
.reel-dot{width:8px;height:8px;border-radius:50%;}
.stage-0::before{background:#7c5cfc;}.col-0 .col-title{color:#7c5cfc;}
.stage-1::before{background:#00b4ff;}.col-1 .col-title{color:#00b4ff;}
.stage-2::before{background:#ffb800;}.col-2 .col-title{color:#ffb800;}
.stage-3::before{background:#ff7a00;}.col-3 .col-title{color:#ff7a00;}
.stage-4::before{background:#ff3c5f;}.col-4 .col-title{color:#ff3c5f;}
.stage-5::before{background:#a855f7;}.col-5 .col-title{color:#a855f7;}
.stage-6::before{background:#00e5a0;}.col-6 .col-title{color:#00e5a0;}
.stage-7::before{background:#3a3a3a;}.col-7 .col-title{color:#555;}
.proj-card.stage-7{opacity:0.45;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:16px;backdrop-filter:blur(4px);overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(–card);border:1px solid var(–border);border-radius:18px;width:100%;max-width:680px;padding:24px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.6);margin:auto;}
.modal-title{font-family:‘Bebas Neue’,cursive;font-size:26px;letter-spacing:1px;margin-bottom:14px;}
.close-btn{position:absolute;top:16px;right:16px;background:var(–tag-bg);border:1px solid var(–border);color:var(–muted);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.close-btn:hover{border-color:var(–accent);color:var(–accent);}
.modal-tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid var(–border);}
.tab-btn{background:none;border:none;color:var(–muted);font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:600;padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
.tab-btn.active{color:var(–accent);border-bottom-color:var(–accent);}
.tab-pane{display:none;}.tab-pane.active{display:block;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-full{grid-column:1/-1;}
label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(–muted);display:block;margin-bottom:5px;font-weight:600;}
input,select,textarea{width:100%;background:var(–surface);border:1px solid var(–border);color:var(–text);border-radius:8px;padding:9px 11px;font-family:‘DM Sans’,sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(–accent);}
textarea{resize:vertical;min-height:70px;}
select option{background:var(–card);}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px;}
.checkbox-item{display:flex;align-items:center;gap:6px;background:var(–surface);border:1px solid var(–border);border-radius:8px;padding:6px 10px;cursor:pointer;transition:all .2s;}
.checkbox-item input[type=checkbox]{width:auto;}
.checkbox-item:has(input:checked){border-color:var(–accent3);background:rgba(0,229,160,.08);color:var(–accent3);}
.checkbox-item label{margin:0;color:inherit;cursor:pointer;text-transform:none;letter-spacing:0;font-size:12px;}
.form-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.btn-secondary{background:transparent;border:1px solid var(–border);color:var(–muted);border-radius:8px;padding:9px 18px;font-family:‘DM Sans’,sans-serif;font-size:13px;cursor:pointer;}
.btn-danger{background:transparent;border:1px solid #ff3c5f44;color:var(–accent);border-radius:8px;padding:9px 18px;font-family:‘DM Sans’,sans-serif;font-size:13px;cursor:pointer;margin-right:auto;}
.btn-danger:hover{background:rgba(255,60,95,.1);}
.btn-restore{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(–accent3);border-radius:8px;padding:9px 18px;font-family:‘DM Sans’,sans-serif;font-size:13px;cursor:pointer;margin-right:auto;}

/* REELS */
.reels-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.reels-title{font-size:13px;font-weight:700;}
.btn-add-reel{background:var(–tag-bg);border:1px solid var(–border);color:var(–accent3);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:‘DM Sans’,sans-serif;}
.reel-item{background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:12px;margin-bottom:8px;}
.reel-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.reel-num{background:var(–accent);color:#fff;border-radius:6px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.reel-name-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(–border);color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:600;padding:2px 4px;outline:none;border-radius:0;}
.reel-name-input:focus{border-bottom-color:var(–accent);}
.reel-name-input::placeholder{color:var(–muted);font-weight:400;}
.btn-del-reel{background:none;border:none;color:var(–muted);cursor:pointer;font-size:16px;padding:2px 4px;flex-shrink:0;}
.btn-del-reel:hover{color:var(–accent);}
.reel-stages{display:flex;flex-wrap:wrap;gap:5px;}
.reel-stage-btn{display:flex;align-items:center;gap:5px;background:var(–tag-bg);border:1px solid var(–border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:11px;font-weight:600;color:var(–muted);font-family:‘DM Sans’,sans-serif;}
.reel-stage-btn .dot{width:6px;height:6px;border-radius:50%;background:var(–muted);flex-shrink:0;}
.rs-approved.done{background:rgba(0,180,255,.15);border-color:#00b4ff;color:#00b4ff;}.rs-approved.done .dot{background:#00b4ff;}
.rs-shot.done{background:rgba(255,122,0,.15);border-color:#ff7a00;color:#ff7a00;}.rs-shot.done .dot{background:#ff7a00;}
.rs-editing.done{background:rgba(255,60,95,.15);border-color:#ff3c5f;color:#ff3c5f;}.rs-editing.done .dot{background:#ff3c5f;}
.rs-review.done{background:rgba(168,85,247,.15);border-color:#a855f7;color:#a855f7;}.rs-review.done .dot{background:#a855f7;}
.rs-revision.done{background:rgba(255,184,0,.15);border-color:#ffb800;color:#ffb800;}.rs-revision.done .dot{background:#ffb800;}
.rs-delivered.done{background:rgba(0,229,160,.15);border-color:#00e5a0;color:#00e5a0;}.rs-delivered.done .dot{background:#00e5a0;}

/* NOTIF */
.notif-panel{position:fixed;top:68px;right:16px;width:310px;background:var(–card);border:1px solid var(–border);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:150;display:none;padding:14px;max-height:460px;overflow-y:auto;}
.notif-panel.open{display:block;}
.notif-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(–muted);margin-bottom:10px;font-weight:700;}
.notif-item{padding:9px 11px;border-radius:8px;margin-bottom:6px;background:var(–surface);border-left:3px solid var(–accent2);font-size:12px;line-height:1.5;}
.notif-item.urgent{border-color:var(–accent);}
.notif-project{font-weight:700;}.notif-msg{color:var(–muted);margin-top:1px;}

/* ANALYTICS MODAL */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.an-card{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:14px;text-align:center;}
.an-num{font-family:‘Bebas Neue’,cursive;font-size:30px;line-height:1;}
.an-label{font-size:10px;color:var(–muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.month-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(–surface);border-radius:8px;margin-bottom:6px;}
.month-name{font-size:13px;font-weight:600;}
.month-amt{font-size:13px;font-weight:700;color:var(–accent3);}
.month-bar-wrap{flex:1;margin:0 12px;height:4px;background:var(–border);border-radius:2px;overflow:hidden;}
.month-bar{height:100%;background:linear-gradient(90deg,var(–accent3),var(–accent2));border-radius:2px;}

/* DRAG */
.proj-card.dragging{opacity:0.2;}
.drag-ghost{position:fixed;z-index:9999;pointer-events:none;opacity:0.92;transform:rotate(2deg) scale(1.04);box-shadow:0 20px 60px rgba(0,0,0,.7);border-radius:10px;background:var(–card);border:1px solid var(–accent);padding:11px;width:185px;}
.col-body.drag-over{background:rgba(255,60,95,0.08);border-radius:10px;outline:2px dashed rgba(255,60,95,0.4);outline-offset:-4px;}
.empty-col{text-align:center;padding:24px 8px;color:var(–muted);font-size:12px;}
.empty-icon{font-size:22px;margin-bottom:6px;opacity:.4;}

@media(max-width:900px){.stats-bar{grid-template-columns:repeat(3,1fr);}.kanban{grid-template-columns:repeat(4,minmax(165px,1fr));}}
@media(max-width:600px){.stats-bar{grid-template-columns:repeat(2,1fr);}.form-grid{grid-template-columns:1fr;}.kanban{grid-template-columns:repeat(2,minmax(155px,1fr));}.analytics-grid{grid-template-columns:1fr;}}
</style>

</head>
<body>

<!-- LOGIN -->

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">KAI<span>CRM</span></div>
    <div class="login-sub" id="login-sub">Введите PIN-код</div>
    <div class="pin-display">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="numpad" id="numpad">
      <button class="num-btn" onclick="pinPress('1')">1</button>
      <button class="num-btn" onclick="pinPress('2')">2</button>
      <button class="num-btn" onclick="pinPress('3')">3</button>
      <button class="num-btn" onclick="pinPress('4')">4</button>
      <button class="num-btn" onclick="pinPress('5')">5</button>
      <button class="num-btn" onclick="pinPress('6')">6</button>
      <button class="num-btn" onclick="pinPress('7')">7</button>
      <button class="num-btn" onclick="pinPress('8')">8</button>
      <button class="num-btn" onclick="pinPress('9')">9</button>
      <button class="num-btn zero" onclick="pinPress('0')">0</button>
      <button class="num-btn del" onclick="pinDel()">⌫</button>
    </div>
    <div class="login-err" id="login-err"></div>
    <div class="blocked-timer" id="blocked-timer"></div>
  </div>
</div>

<!-- LOADING -->

<div id="loading-screen" style="display:none">
  <div class="ll">KAI<span>CRM</span></div>
  <div class="lb"><div class="lf"></div></div>
  <div style="font-size:12px;color:var(--muted)">Подключение...</div>
</div>

<header style="display:none" id="main-header">
  <div class="logo">KAI<span>CRM</span></div>
  <div class="header-right">
    <div class="sync-badge"><div class="sync-dot loading" id="sync-dot"></div><span id="sync-label">Синхронизация...</span></div>
    <div class="who-badge"><div class="who-dot"></div><span id="who-name">—</span></div>
    <button id="notif-btn" onclick="toggleNotif()">🔔<div class="notif-dot" id="notif-dot"></div></button>
    <button class="btn-header" id="btn-analytics" onclick="openAnalytics()" style="display:none">📊 Аналитика</button>

<script type="module">

// ══ ПОЛЬЗОВАТЕЛИ ══
const USERS={
  '1441':{name:'Илья', canSeeMoney:true, canDelete:true, seeAll:true},
  '2811':{name:'Ян',   canSeeMoney:true, canDelete:true, seeAll:true},

};

const JOKES=[
  '🤡 Серьёзно? Ты не помнишь свой PIN?',
  '🕵️ О, шпион! Думаешь мы не видим тебя?',

// ══ PIN логика ══
let pinBuf='', failCount=0, blocked=false, blockTimer=null, currentUser=null;

function getBlockedUntil(){ return parseInt(localStorage.getItem('kai_blocked_until')||'0'); }
function setBlockedUntil(t){ localStorage.setItem('kai_blocked_until',String(t)); }
function getFailCount(){ return parseInt(localStorage.getItem('kai_fails')||'0'); }
function setFailCount(n){ localStorage.setItem('kai_fails',String(n)); }

function checkBlockOnLoad(){
  const until=getBlockedUntil();
  if(until>Date.now()){ startBlockCountdown(until); return true; }
  return false;
}

function startBlockCountdown(until){
  blocked=true;
  document.getElementById('numpad').style.opacity='0.3';
  document.getElementById('numpad').style.pointerEvents='none';
  document.getElementById('login-sub').textContent='🔒 Доступ заблокирован';
  const tick=()=>{
    const left=Math.ceil((until-Date.now())/1000);
    if(left<=0){
      blocked=false; failCount=0; setFailCount(0); setBlockedUntil(0);
      document.getElementById('numpad').style.opacity='1';
      document.getElementById('numpad').style.pointerEvents='';
      document.getElementById('login-sub').textContent='Введите PIN-код';
      document.getElementById('blocked-timer').textContent='';
      document.getElementById('login-err').textContent='';
      return;
    }
    document.getElementById('blocked-timer').textContent=`Попробуйте через ${left} сек.`;
    setTimeout(tick,1000);
  };
  tick();
}

window.pinPress=function(d){
  if(blocked)return;
  if(pinBuf.length>=4)return;
  pinBuf+=d; updateDots();
  if(pinBuf.length===4) setTimeout(checkPin,120);
};
window.pinDel=function(){
  if(blocked)return;
  pinBuf=pinBuf.slice(0,-1); updateDots();
  document.getElementById('login-err').textContent='';
};

function updateDots(){
  for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<pinBuf.length);
}

function checkPin(){
  const user=USERS[pinBuf];
  if(user){
    setFailCount(0); setBlockedUntil(0);
    currentUser=user;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('loading-screen').style.display='flex';
    document.getElementById('who-name').textContent=user.name;
    applyPermissions(); initFirebase();
  } else {
    failCount=getFailCount()+1; setFailCount(failCount);
    document.querySelectorAll('.pin-dot').forEach(d=>{d.classList.add('shake');setTimeout(()=>d.classList.remove('shake'),400);});
    const remaining=5-failCount;
    if(failCount>=5){
      const until=Date.now()+5*60*1000; setBlockedUntil(until);
      document.getElementById('login-err').className='login-err red';
      document.getElementById('login-err').textContent='🚨 5 попыток исчерпано! Заблокировано на 5 минут.';
      startBlockCountdown(until);
    } else {
      const joke=JOKES[Math.min(failCount-1,JOKES.length-1)];
      document.getElementById('login-err').className='login-err '+(remaining<=2?'red':'yellow');
      document.getElementById('login-err').textContent=`${joke} (осталось ${remaining})`;
    }
    pinBuf=''; setTimeout(updateDots,400);
  }
}

function applyPermissions(){
  const show=currentUser.canSeeMoney;

};

// ══ FIREBASE ══
const FB={

// ══ TELEGRAM ══
const TG_TOKEN='8680116612:AAELx_GE0EV8R9ZUw2yOEqT0E1w3SHLGD7w';
const TG_IDS=['325056880','-1003838515343'];

// ══ DEADLINE ALERTS (жёлтый = 2 дня) ══
let deadlineCheckDone=false;
function checkDeadlinesOnce(){
  if(deadlineCheckDone)return; deadlineCheckDone=true;
  pArr().filter(p=>p.stage!==7&&p.deadline).forEach(p=>{
    const diff=(new Date(p.deadline)-new Date())/86400000;
    const key=`notif_yellow_${p.id}_${p.deadline}`;
    if(diff>=1&&diff<2&&!localStorage.getItem(key)){
      localStorage.setItem(key,'1');
      sendTG(`🟡 <b>Дедлайн послезавтра!</b>\n\nКлиент: <b>${p.name}</b>\nДедлайн: ${fmtDate(p.deadline)}\nЭтап: ${STAGES[p.stage].name}\nОтв: ${p.owner||'—'}`);
    }
    const keyRed=`notif_red_${p.id}_${p.deadline}`;
    if(diff>=0&&diff<1&&!localStorage.getItem(keyRed)){
      localStorage.setItem(keyRed,'1');
      sendTG(`🔴 <b>Дедлайн ЗАВТРА!</b>\n\nКлиент: <b>${p.name}</b>\nДедлайн: ${fmtDate(p.deadline)}\nЭтап: ${STAGES[p.stage].name}\nОтв: ${p.owner||'—'}`);
    }
    const keyOver=`notif_over_${p.id}_${p.deadline}`;
    if(diff<0&&!localStorage.getItem(keyOver)){
      localStorage.setItem(keyOver,'1');
      sendTG(`🚨 <b>Просрочен дедлайн!</b>\n\nКлиент: <b>${p.name}</b>\nДедлайн был: ${fmtDate(p.deadline)}\nОтв: ${p.owner||'—'}`);
    }
  });
}

// ══ ДАННЫЕ ══
const STAGES=[
  {name:'📞 Переговоры'},{name:'💡 Идея'},{name:'💰 Оплата'},{name:'🎬 Съёмка'},
  {name:'✂️ Монтаж'},{name:'👁️ Проверка'},{name:'✅ Готово'},{name:'🗑 Удалён'},
];
const REEL_STAGES=[
  {key:'approved',label:'✅ Утверждён',cls:'rs-approved'},{key:'shot',label:'🎬 Отснят',cls:'rs-shot'},
  {key:'editing',label:'✂️ Монтаж',cls:'rs-editing'},{key:'review',label:'👁 Проверка',cls:'rs-review'},
  {key:'revision',label:'✏️ Правки',cls:'rs-revision'},{key:'delivered',label:'📤 Сдан',cls:'rs-delivered'},
];
const AV_INI={Илья:'И',Ян:'Я',Влад:'В',Элвин:'Э'};
const AV_CLS={Илья:'av-0',Ян:'av-1',Влад:'av-2',Элвин:'av-3'};
const MONTHS=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

let projects={},editingId=null,filterMember=null,searchQuery='',tempReels=[];
let wasDragging=false,ghost=null,dragId=null,dragOrigin=null,ghostOffX=0,ghostOffY=0;

function pArr(){return Object.entries(projects).map(([id,p])=>({...p,id}));}

function visible(){
  let arr=pArr();
  if(!currentUser.seeAll) arr=arr.filter(p=>(p.team||[]).includes(currentUser.name));
  if(filterMember) arr=arr.filter(p=>(p.team||[]).includes(filterMember));
  if(searchQuery) arr=arr.filter(p=>p.name&&p.name.toLowerCase().includes(searchQuery));
  return arr;
}

// ══ DEADLINE BADGE ══
function deadlineBadge(deadline){
  if(!deadline)return'';
  const diff=(new Date(deadline)-new Date())/86400000;
  if(diff<0)return`<div class="deadline-badge db-over">🚨 Просрочено</div>`;
  if(diff<1)return`<div class="deadline-badge db-red">🔴 Завтра!</div>`;
  if(diff<2)return`<div class="deadline-badge db-yellow">🟡 ${Math.ceil(diff)} дн.</div>`;
  if(diff<3)return`<div class="deadline-badge db-green">🟢 ${Math.ceil(diff)} дн.</div>`;
  return`<div class="deadline-badge db-green">🟢 ${Math.ceil(diff)} дн.</div>`;
}

function render(){
  const kb=document.getElementById('kanban'); kb.innerHTML='';
  const all=visible();
  STAGES.forEach((s,si)=>{
    const cards=all.filter(p=>p.stage==si);
    const col=document.createElement('div'); col.className=`column col-${si}`;
    col.innerHTML=`<div class="col-header"><span class="col-title">${s.name}</span><span class="col-count">${cards.length}</span></div><div class="col-body" id="col-${si}"></div>`;
    kb.appendChild(col);
    const body=col.querySelector('.col-body');
    if(!cards.length){body.innerHTML=`<div class="empty-col"><div class="empty-icon">📭</div>Пусто</div>`;return;}
    cards.forEach(p=>{
      const el=document.createElement('div'); el.className=`proj-card stage-${si}`;
      el.dataset.id=String(p.id); el.dataset.stage=String(si);
      const moneyTag=currentUser.canSeeMoney?(p.paid==='yes'?`<span class="tag tag-paid">Оплачено</span>`:p.paid==='partial'?`<span class="tag" style="color:#ff7a00">Частично</span>`:`<span class="tag tag-nopay">Не оплачено</span>`):'';
      const budgetTag=currentUser.canSeeMoney&&p.budget?`<span class="tag" style="color:var(--muted)">${p.budget} MDL</span>`:'';
      const reels=p.reels||[];
      const rTag=reels.length?`<span class="tag" style="color:#a855f7">🎬 ${reels.length}</span>`:'';
      const dots=reels.map(r=>`<span class="reel-dot" style="background:${reelClr(r)}"></span>`).join('');
      const avs=(p.team||[]).map(m=>`<span class="avatar ${AV_CLS[m]||'av-0'}">${AV_INI[m]||'?'}</span>`).join('');
      el.innerHTML=`<div class="proj-name">${esc(p.name||'')}</div><div class="proj-meta">${esc(p.contact||'—')}</div><div class="proj-tags">${moneyTag}${budgetTag}${rTag}</div>${reels.length?`<div class="reels-mini">${dots}</div>`:''}${si!==7?deadlineBadge(p.deadline):''}<div class="proj-footer"><div class="assignees">${avs}</div><span style="font-size:10px;color:var(--muted)">📅 ${p.deadline?fmtDate(p.deadline):'—'}</span></div>`;
      el.onclick=()=>{if(!wasDragging)openEdit(p.id);};
      addDrag(el); body.appendChild(el);
    });
  });
  updateStats(); updateNotifs();
}

function updateStats(){
  const arr=pArr().filter(p=>currentUser.seeAll||(p.team||[]).includes(currentUser.name));
  const active=arr.filter(p=>p.stage!==7);
  document.getElementById('stat-total').textContent=active.length;
  document.getElementById('stat-active').textContent=active.filter(p=>p.stage<6).length;
  // Рилсы только из активных проектов (не удалённых)
  document.getElementById('stat-reels').textContent=active.reduce((a,p)=>a+(p.reels||[]).length,0);
  if(currentUser.canSeeMoney) document.getElementById('stat-paid').textContent=active.filter(p=>p.paid==='yes').length;
  document.getElementById('stat-overdue').textContent=active.filter(p=>p.deadline&&deadlineDiff(p.deadline)<0).length;
}

function deadlineDiff(d){return d?(new Date(d)-new Date())/86400000:Infinity;}

function updateNotifs(){
  const notifs=[];
  pArr().filter(p=>p.stage!==7).forEach(p=>{
    if(!currentUser.seeAll&&!(p.team||[]).includes(currentUser.name))return;
    if(p.deadline){
      const d=deadlineDiff(p.deadline);
      if(d<0)notifs.push({project:p.name,msg:'🚨 Просрочен дедлайн',type:'urgent'});
      else if(d<1)notifs.push({project:p.name,msg:'🔴 Дедлайн завтра!',type:'urgent'});
      else if(d<2)notifs.push({project:p.name,msg:`🟡 Дедлайн через ${Math.ceil(d)} дн.`,type:'warn'});
    }
    if(currentUser.canSeeMoney&&p.paid==='no'&&p.stage>=2)notifs.push({project:p.name,msg:'Оплата не получена',type:'urgent'});
    (p.reels||[]).forEach(r=>{if(r.revision&&!r.delivered)notifs.push({project:p.name,msg:`"${r.name||'Рилс'}" — правки`,type:'urgent'});});
  });
  document.getElementById('notif-list').innerHTML=!notifs.length?'<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">Всё в порядке 🎉</div>':notifs.map(n=>`<div class="notif-item ${n.type==='urgent'?'urgent':''}"><div class="notif-project">${esc(n.project)}</div><div class="notif-msg">${n.msg}</div></div>`).join('');
  document.getElementById('notif-dot').style.display=notifs.some(n=>n.type==='urgent')?'block':'none';
}

window.toggleNotif=()=>document.getElementById('notif-panel').classList.toggle('open');

// ══ АНАЛИТИКА ══
window.openAnalytics=function(){
  const arr=pArr().filter(p=>p.stage!==7);
  const totalBudget=arr.reduce((s,p)=>s+(+p.budget||0),0);
  const paidBudget=arr.filter(p=>p.paid==='yes').reduce((s,p)=>s+(+p.budget||0),0);
  const pendingBudget=arr.filter(p=>p.paid!=='yes').reduce((s,p)=>s+(+p.budget||0),0);
  const totalReels=arr.reduce((s,p)=>s+(p.reels||[]).length,0);
  document.getElementById('an-grid').innerHTML=`
    <div class="an-card"><div class="an-num" style="color:var(--accent3)">${paidBudget.toLocaleString()} MDL</div><div class="an-label">Получено</div></div>
    <div class="an-card"><div class="an-num" style="color:var(--accent2)">${pendingBudget.toLocaleString()} MDL</div><div class="an-label">Ожидается</div></div>
    <div class="an-card"><div class="an-num" style="color:var(--accent)">${totalBudget.toLocaleString()} MDL</div><div class="an-label">Всего контрактов</div></div>
    <div class="an-card"><div class="an-num" style="color:#a855f7">${totalReels}</div><div class="an-label">Рилсов всего</div></div>
  `;
  // По месяцам
  const byMonth={};
  arr.filter(p=>p.paid==='yes'&&p.updatedAt).forEach(p=>{
    const d=new Date(p.updatedAt);
    const key=`${d.getFullYear()}-${d.getMonth()}`;
    byMonth[key]=(byMonth[key]||{label:MONTHS[d.getMonth()]+' '+d.getFullYear(),amt:0});
    byMonth[key].amt+=(+p.budget||0);
  });
  const months=Object.values(byMonth).slice(-6);
  const max=Math.max(...months.map(m=>m.amt),1);
  document.getElementById('an-months').innerHTML=!months.length?'<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Нет данных</div>':months.map(m=>`<div class="month-row"><span class="month-name">${m.label}</span><div class="month-bar-wrap"><div class="month-bar" style="width:${Math.round(m.amt/max*100)}%"></div></div><span class="month-amt">${m.amt.toLocaleString()}</span></div>`).join('');
  document.getElementById('analytics-overlay').classList.add('open');
};

// ══ ЭКСПОРТ CSV ══
window.exportCSV=function(){
  const arr=pArr().filter(p=>p.stage!==7);
  const rows=[['Клиент','Контакт','Этап','Ответственный','Бюджет MDL','Оплата','Дедлайн','Рилсов','Команда']];
  arr.forEach(p=>rows.push([
    p.name||'',p.contact||'',STAGES[p.stage]?.name||'',p.owner||'',
    p.budget||'',p.paid==='yes'?'Оплачено':p.paid==='partial'?'Частично':'Не оплачено',
    p.deadline?fmtDate(p.deadline):'',
    (p.reels||[]).length,
    (p.team||[]).join(', ')
  ]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`KAI_CRM_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast('📤 Экспорт готов!');
};

// ══ MODAL ══
window.openNew=function(){
  editingId=null;
  document.getElementById('modal-heading').textContent='Новый клиент';
  document.getElementById('btn-delete').style.display='none';
  document.getElementById('btn-restore').style.display='none';
  clearForm(); tempReels=[]; renderReels();
  switchTab('info',document.getElementById('tab-btn-info'));
  document.getElementById('modal-overlay').classList.add('open');
};

function openEdit(id){
  const p=projects[id]; if(!p)return;
  editingId=id;
  document.getElementById('modal-heading').textContent=p.name;
  const isDeleted=p.stage===7;
  document.getElementById('btn-delete').style.display=currentUser.canDelete&&!isDeleted?'':'none';
  document.getElementById('btn-restore').style.display=isDeleted?'':'none';
  fillForm({...p,id});
  tempReels=JSON.parse(JSON.stringify(p.reels||[]));
  renderReels();
  switchTab('info',document.getElementById('tab-btn-info'));
  document.getElementById('modal-overlay').classList.add('open');
}

function clearForm(){
  ['f-name','f-contact','f-budget','f-notes','f-idea','f-script','f-shoot-date','f-deadline'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('f-stage').value='0';
  document.getElementById('f-paid').value='no';
  document.getElementById('f-owner').value=currentUser.name;
  ['t-ilya','t-yan','t-vlad','t-elvin'].forEach(id=>{const e=document.getElementById(id);if(e)e.checked=false;});
}

function fillForm(p){
  document.getElementById('f-name').value=p.name||'';
  document.getElementById('f-contact').value=p.contact||'';
  document.getElementById('f-stage').value=p.stage||0;
  document.getElementById('f-owner').value=p.owner||currentUser.name;
  document.getElementById('f-shoot-date').value=p.shootDate||'';
  document.getElementById('f-deadline').value=p.deadline||'';
  document.getElementById('f-idea').value=p.idea||'';
  document.getElementById('f-script').value=p.script||'';
  document.getElementById('f-notes').value=p.notes||'';
  if(currentUser.canSeeMoney){document.getElementById('f-budget').value=p.budget||'';document.getElementById('f-paid').value=p.paid||'no';}
  const tm={Илья:'t-ilya',Ян:'t-yan',Влад:'t-vlad',Элвин:'t-elvin'};
  ['t-ilya','t-yan','t-vlad','t-elvin'].forEach(id=>{const e=document.getElementById(id);if(e)e.checked=false;});
  (p.team||[]).forEach(m=>{if(tm[m])document.getElementById(tm[m]).checked=true;});
}

window.saveProject=async function(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Введите название!');return;}
  const team=[];
  if(document.getElementById('t-ilya').checked)team.push('Илья');
  if(document.getElementById('t-yan').checked)team.push('Ян');
  if(document.getElementById('t-vlad').checked)team.push('Влад');
  if(document.getElementById('t-elvin').checked)team.push('Элвин');
  document.querySelectorAll('.reel-name-input').forEach(inp=>{const r=tempReels.find(r=>r.id===inp.dataset.rid);if(r)r.name=inp.value;});
  const newStage=+document.getElementById('f-stage').value;
  const oldStage=editingId&&projects[editingId]?projects[editingId].stage:null;
  const data={name,contact:document.getElementById('f-contact').value,stage:newStage,owner:document.getElementById('f-owner').value,team,shootDate:document.getElementById('f-shoot-date').value,deadline:document.getElementById('f-deadline').value,idea:document.getElementById('f-idea').value,script:document.getElementById('f-script').value,notes:document.getElementById('f-notes').value,reels:JSON.parse(JSON.stringify(tempReels)),updatedBy:currentUser.name,updatedAt:Date.now()};
  if(currentUser.canSeeMoney){data.budget=document.getElementById('f-budget').value;data.paid=document.getElementById('f-paid').value;}
  else if(editingId&&projects[editingId]){data.budget=projects[editingId].budget||'';data.paid=projects[editingId].paid||'no';}
  const id=editingId||('p_'+Date.now());
  const isNew=!editingId;
  // Telegram
  const oldReels=editingId&&projects[editingId]?(projects[editingId].reels||[]):[];
  tempReels.forEach(r=>{const o=oldReels.find(x=>x.id===r.id);if(r.revision&&(!o||!o.revision))sendTG(`✏️ <b>Правки!</b>\n\n${data.name}\nРилс: ${r.name||'—'}`);});
  await saveFB(id,data);
  if(isNew)sendTG(`🆕 <b>Новый клиент!</b>\n\n${data.name}\nЭтап: ${STAGES[newStage].name}\nДобавил: ${currentUser.name}`);
  else if(oldStage!==null&&oldStage!==newStage)sendTG(`🔄 <b>Этап изменён</b>\n\n${data.name}\n${STAGES[oldStage].name} → ${STAGES[newStage].name}\n${currentUser.name}`);
  closeModalBtn(); toast(isNew?'✅ Клиент добавлен':'✅ Сохранено');
};

window.deleteProject=async function(){
  if(!currentUser.canDelete){alert('Нет прав');return;}
  if(!confirm('Переместить в удалённые?'))return;
  const p=projects[editingId]; if(!p)return;
  await saveFB(editingId,{...p,stage:7,updatedBy:currentUser.name,updatedAt:Date.now()});
  closeModalBtn(); toast('🗑 Перемещено в удалённые');
};

window.restoreProject=async function(){
  const p=projects[editingId]; if(!p)return;
  await saveFB(editingId,{...p,stage:0,updatedBy:currentUser.name,updatedAt:Date.now()});
  closeModalBtn(); toast('♻️ Проект восстановлен в Переговоры');
};

window.closeModalOuter=e=>{if(e.target===document.getElementById('modal-overlay'))closeModalBtn();};
window.closeModalBtn=()=>document.getElementById('modal-overlay').classList.remove('open');
window.filterCards=q=>{searchQuery=q.toLowerCase();render();};
window.filterMemberFn=(m,el)=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');filterMember=m;render();};
window.switchTab=(n,el)=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('tab-'+n).classList.add('active');};

// ══ REELS ══
window.addReel=()=>{tempReels.push({id:'r_'+Date.now(),name:'',approved:false,shot:false,editing:false,review:false,revision:false,delivered:false});renderReels();};
window.deleteReel=id=>{tempReels=tempReels.filter(r=>r.id!==id);renderReels();};
window.updateReelName=(id,v)=>{const r=tempReels.find(r=>r.id===id);if(r)r.name=v;};
window.toggleReelStage=(id,key,btn)=>{const r=tempReels.find(r=>r.id===id);if(!r)return;r[key]=!r[key];btn.classList.toggle('done',r[key]);};

function renderReels(){
  const list=document.getElementById('reels-list'),empty=document.getElementById('reels-empty');
  list.innerHTML='';empty.style.display=tempReels.length?'none':'';
  tempReels.forEach((r,i)=>{
    const d=document.createElement('div');d.className='reel-item';
    d.innerHTML=`<div class="reel-top"><span class="reel-num">${i+1}</span><input class="reel-name-input" placeholder="Название рилса..." value="${esc(r.name||'')}" data-rid="${r.id}" oninput="updateReelName('${r.id}',this.value)"><button class="btn-del-reel" type="button" onclick="deleteReel('${r.id}')">✕</button></div><div class="reel-stages">${REEL_STAGES.map(s=>`<button type="button" class="reel-stage-btn ${s.cls}${r[s.key]?' done':''}" onclick="toggleReelStage('${r.id}','${s.key}',this)"><span class="dot"></span>${s.label}</button>`).join('')}</div>`;
    list.appendChild(d);
  });
}

function reelClr(r){if(r.delivered)return'#00e5a0';if(r.revision)return'#ffb800';if(r.review)return'#a855f7';if(r.editing)return'#ff3c5f';if(r.shot)return'#ff7a00';if(r.approved)return'#00b4ff';return'#444';}

// ══ DRAG ══
function addDrag(el){
  el.addEventListener('touchstart',e=>startDrag(el,e.touches[0].clientX,e.touches[0].clientY,e),{passive:false});
  el.addEventListener('mousedown',e=>{if(e.button!==0)return;startDrag(el,e.clientX,e.clientY,e);});
}
function startDrag(card,cx,cy,e){
  dragId=card.dataset.id;dragOrigin=card.dataset.stage;wasDragging=false;
  const r=card.getBoundingClientRect();ghostOffX=cx-r.left;ghostOffY=cy-r.top;
  ghost=document.createElement('div');ghost.className='drag-ghost';ghost.innerHTML=card.innerHTML;
  ghost.style.cssText=`left:${cx-ghostOffX}px;top:${cy-ghostOffY}px;width:${r.width}px;`;
  document.body.appendChild(ghost);card.classList.add('dragging');e.preventDefault();
  document.addEventListener('mousemove',onMM);document.addEventListener('mouseup',onMU);
  document.addEventListener('touchmove',onTM,{passive:false});document.addEventListener('touchend',onTE);
}
function onMM(e){moveG(e.clientX,e.clientY);}
function onTM(e){e.preventDefault();moveG(e.touches[0].clientX,e.touches[0].clientY);}
function onMU(e){endDrag(e.clientX,e.clientY);document.removeEventListener('mousemove',onMM);document.removeEventListener('mouseup',onMU);}
function onTE(e){endDrag(e.changedTouches[0].clientX,e.changedTouches[0].clientY);document.removeEventListener('touchmove',onTM);document.removeEventListener('touchend',onTE);}
function moveG(cx,cy){if(!ghost)return;wasDragging=true;ghost.style.left=(cx-ghostOffX)+'px';ghost.style.top=(cy-ghostOffY)+'px';ghost.style.display='none';const el=document.elementFromPoint(cx,cy);ghost.style.display='';document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('drag-over'));const col=el&&el.closest('.col-body');if(col)col.classList.add('drag-over');}
async function endDrag(cx,cy){
  if(ghost){ghost.remove();ghost=null;}document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('drag-over'));document.querySelectorAll('.proj-card').forEach(c=>c.classList.remove('dragging'));
  if(!wasDragging||!dragId){dragId=null;return;}
  const el=document.elementFromPoint(cx,cy),col=el&&el.closest('.column');
  if(col){const idx=[...document.querySelectorAll('.column')].indexOf(col);if(idx>=0&&idx!==+dragOrigin){const p=projects[dragId];if(p){await saveFB(dragId,{...p,stage:idx,updatedBy:currentUser.name,updatedAt:Date.now()});sendTG(`🔄 ${p.name}: ${STAGES[+dragOrigin].name} → ${STAGES[idx].name} (${currentUser.name})`);toast(`→ ${STAGES[idx].name}`);}}}
  dragId=null;
}

// ══ UTILS ══
function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}.${m}.${y.slice(2)}`;}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){let t=document.getElementById('_toast');if(!t){t=document.createElement('div');t.id='_toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e2e;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s;box-shadow:0 8px 30px rgba(0,0,0,.5);';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2200);}

document.addEventListener('click',e=>{const p=document.getElementById('notif-panel'),b=document.getElementById('notif-btn');if(p&&b&&!p.contains(e.target)&&!b.contains(e.target))p.classList.remove('open');});
document.addEventListener('keydown',e=>{if(document.getElementById('login-screen').style.display==='none')return;if(e.key>='0'&&e.key<='9')pinPress(e.key);if(e.key==='Backspace')pinDel();});

// Проверка блокировки при загрузке
checkBlockOnLoad();
</script>
